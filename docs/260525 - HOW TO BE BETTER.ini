 Honest assessment. I'll prioritise by what would actually move your interview rate, not by what's
  technically interesting.

  Critical audit — JobHub generation pipeline

  The pipeline you actually have

  JD + click Generate
      │
      ├─ Stage 1: Claude builds JSON "blueprint" (opening hook, proof points, tone, pitfalls)
      │
      ├─ Stage 2: Llama 3.3 70B writes the document using blueprint + rules file + JD
      │
      ├─ Stage 3: Claude Sonnet quality gate — 3-4 checks, max 4 surgical rewrites
      │
      └─ Post-process: em-dash strip, voice enforcer (resume only), provenance tags

  Honest baseline: This is more sophisticated than 90% of people pasting "write me a resume for this job"   
  into ChatGPT. But sophistication ≠ output quality. Let me show you where it leaks.

  ---
  CRITICAL gaps (affect interview rate now)

  1. Silent failures hide degraded output from the user

  Three places this happens:

  ┌────────────────────────────────────────────┬─────────────────────┬──────────────────────────────────┐   
  │                    Path                    │    What "fails"     │          What user sees          │   
  ├────────────────────────────────────────────┼─────────────────────┼──────────────────────────────────┤   
  │ quality-gate.ts:48 — [QualityGate] Parse   │ Claude returned bad │ Raw Llama output, no quality     │   
  │ failed — treating as passed                │  JSON               │ check, no warning to user        │   
  ├────────────────────────────────────────────┼─────────────────────┼──────────────────────────────────┤   
  │ routes/generate.ts:201 — Stage 1 falls     │ Blueprint           │ Generic prompt with no strategic │   
  │ back to standard prompt                    │ generation failed   │  framing; output looks generic   │   
  ├────────────────────────────────────────────┼─────────────────────┼──────────────────────────────────┤   
  │ generation.ts:185 — per-criterion          │ Pinecone failed for │ Prompt has zero evidence for     │   
  │ retrieval empty array                      │  a criterion        │ that criterion → LLM fabricates  │   
  └────────────────────────────────────────────┴─────────────────────┴──────────────────────────────────┘   

  Impact: User can't tell when they got the A-tier output vs C-tier output. Every gen looks like a success. 
  No quality variance visibility.

  2. Achievement-JD match has no floor

  generation.ts:55-57:

  if (semanticScore >= 0.70 || (semanticScore >= 0.55 && keywordOverlap >= 2)) tier = 'STRONG';

  If a candidate applies for a UX role but their entire achievement bank is sales achievements, the top-5   
  still get used. There's no "this match is too weak — warn the user / push them back to add relevant       
  achievements" gate. Effect: the most damaging type of bad output — confidently irrelevant.

  3. Cover letter and STAR responses have no voice enforcer

  The deterministic regex scrubber that just took five iterations to get right runs ONLY for RESUME
  (routes/generate.ts:295). Cover letters and selection criteria can still come out with "Kiron is", "He    
  demonstrated", AI-tell phrases. They're protected only by the LLM prompt + quality gate — same advisory   
  layers that failed for resumes.

  4. ATS keyword check is an LLM instruction, not code

  resume_rules.md:17 tells the LLM to run an ATS keyword check. There's no programmatic verification that   
  the JD's keywords actually appear in the output. If Llama skips the check (which it does, often), the     
  candidate's resume might miss the top 5 JD keywords entirely and be filtered by the ATS before a human    
  sees it. This is the difference between getting an interview and not.

  5. AI-tell phrases leak through despite the pitfall list

  Pitfall flags are passed in the prompt. Llama is told to avoid them. But there's no verifyAITells() regex 
  check after generation like the voice enforcer. Words that sneak in: "leveraging", "spearheading",        
  "robust", "innovative", "passionate about", "synergies", "results-driven" without evidence, "proven track 
  record" as filler. Recruiters scan-detect these in 2 seconds and flag the doc as AI-written.

  ---
  IMPORTANT gaps (drag on quality, less urgent than above)

  6. JD parsing is left entirely to Llama

  The JD goes in as raw text. Llama re-extracts required vs preferred skills, years-of-experience, tools,   
  salary, location every single time. Costs: higher tokens, more inconsistency. Better: pre-extract with a  
  cheap structured pass (Haiku or even a deterministic regex) → feed Llama structured fields → Llama focuses   on writing, not parsing.

  7. Resume Section 11A "banned phrases" list is enforced by LLM, not code

  You have an explicit list in resume_rules.md:354-366 of phrases that must never appear. The LLM is told to   check. There's no post-process regex pass. Same problem as voice — would take 50 lines of code to make   
  deterministic.

  8. The quality gate has a hard 4-rewrite cap

  generation.ts:101 — "Maximum 4 rewrites total across all failing checks". If your resume has 6 voice      
  violations + 2 keyword gaps + 1 grammar issue, 3 problems stay in the final output, silently. No user     
  signal.

  9. Em-dash strip is over-aggressive

  routes/generate.ts:288 — strips ALL em-dashes globally. Em-dashes ARE proper punctuation; replacing every 
  one with " - " produces stilted output. The original concern (downstream renderer issues) is probably     
  overblown — most PDF/DOCX renderers handle em-dashes fine.

  10. Provenance tagging ([AI]) is untunable

  The threshold for "this bullet diverges from source enough to flag" is hardcoded. No way for you to dial  
  up/down without code change. Result: either users see warning noise on every bullet (and ignore them all),   or none (and the warning system does nothing).

  11. Years-of-experience computation is naive

  profileMath.ts:computeYearsOfExperience = earliest start → today, treats all entries flagged type:'work'  
  equally. Doesn't subtract gaps, doesn't filter internships, doesn't treat part-time differently. Will     
  overstate for discontinuous careers. Fine for now, will bite for older / career-changer candidates.       

  12. Profile extraction is single-pass with no verification

  Stage-1 extraction (prompts/extraction.ts) parses uploaded resume → JSON. If it gets the dates wrong, the 
  employer name wrong, the role title wrong — those errors propagate to every generation. No "did we get    
  this right?" UX gate before the user generates their first doc.

  ---
  STRUCTURAL gaps (longer-term)

  13. No automated quality measurement

  You have no eval suite running on PRs / merges to tell you "this prompt change made resume quality go up  
  or down". Reference: evals/promptfooconfig.yaml was mentioned in CLAUDE.md — worth verifying it's actually   wired into CI and run on every prompt change. If it isn't, every prompt edit is a guess.

  14. No A/B testing on outputs

  Industry standard for AI-generated copy is "generate 3, let user pick". You generate one. User is stuck   
  with whatever Llama spat out. Three alternative openings + user click would 2-3x the perceived quality for   the same cost.

  15. No tone quantification

  toneBlueprint is a free-form string. Llama interprets it. No "formality: 7/10, warmth: 4/10, technicality:   8/10" structure. Tone consistency across resume + cover letter + SC for the same JD is therefore
  best-effort.

  16. Same model for strategy and quality check

  Stage 1 (strategy) and Stage 3 (quality) both use Claude Sonnet. Cost-fine, but it means the same model   
  that designed the blueprint is also grading whether the blueprint was executed correctly. It's marking its   own homework. A different model (Haiku 4.5 or GPT-4o-mini) for the QG would be both cheaper and an       
  independent check.

  17. Cost visibility is per-generation, not per-user-month

  Logs print cost_usd per call but you have no per-user-month aggregation visible to you. At scale you won't   know which users are unit-economic disasters.

  ---
  On the competitor question

  You asked me to challenge you. Here's the honest read:

  A power user with Claude/ChatGPT and an hour of effort can match or beat one of your generations because  
  they can:
  - Iterate manually on the opening hook (you're one-shot)
  - Personally know which achievements to surface (you're guessing via Pinecone)
  - Polish tone by re-prompting (you have one shot)

  An average user with Claude/ChatGPT loses to you because they:
  - Don't know what makes an Australian resume work (your rules file is real IP)
  - Don't have the data engineering to match achievements to JDs (your Pinecone setup is real IP)
  - Won't iterate (and your QG + scrubber adds floor that they don't have)

  Where your moat actually is:
  1. The rules file (server/rules/*.md) — that's coaching IP baked in
  2. The deterministic post-processors (voice enforcer) — that's the "can't fail silently" guarantee        
  competitors don't have
  3. The structured pipeline (blueprint → execution → review) — power users won't bother

  Where your moat ISN'T:
  - Using Llama 3.3 70B + Claude (every competitor can use the same models)
  - The prompt instructions alone (anyone with the same skill can write similar prompts)

  ---
  If I had to pick three things to fix next

  These would move interview rate the most, in order:

  1. ATS keyword check as code, not LLM instruction. Extract top JD keywords with a cheap pass, verify they 
  appear in the output, flag/inject if missing. This is the single biggest thing between candidate and human   reader.
  2. Voice + AI-tell scrubber for cover letters and SC. You already have the pattern (voiceEnforcer.ts).    
  Same logic, different patterns. ~2 hours of work to lift the floor on the other two doc types.
  3. Make silent failures visible. When the quality gate parse-fails, when the blueprint falls back to      
  standard, when achievement match quality is below threshold — surface it to the user as "review carefully"   badge on the doc. They can't fix what they don't see.

  Total: probably ~1 day of work for all three, would meaningfully change your output reliability and       
  competitive position.

  ---
  Bottom line

  It's not significantly off. You're well above the median. But you have specific, fixable gaps that — left 
  alone — will cap your interview rate around "good enough" rather than "consistently excellent". The three 
  above are the high-leverage ones.
