<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JobHub mock - editor with rewrites</title>
<style>
  .jobhub-mock--editor-with-rewrites,
  .jobhub-mock--editor-with-rewrites * {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Geist', -apple-system, 'Segoe UI', system-ui, sans-serif;
  }

  .jobhub-mock--editor-with-rewrites {
    background: #FFFFFF;
    border: 1px solid rgba(26, 24, 20, 0.08);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(26,24,20,0.04), 0 4px 16px rgba(26,24,20,0.04);
    padding: 28px;
    width: 720px;
  }

  /* ── Tab bar ── */
  .jh-tab-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .jh-tab {
    padding: 6px 14px;
    border-radius: 9999px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: default;
  }

  .jh-tab--active {
    background: #2D5A6E;
    color: #FFFFFF;
  }

  .jh-tab--inactive {
    background: transparent;
    color: #5C5750;
  }

  /* ── data-active-tab variant switcher ── */
  .jobhub-mock--editor-with-rewrites[data-active-tab="resume"]   .jh-panel--resume,
  .jobhub-mock--editor-with-rewrites[data-active-tab="cover"]    .jh-panel--cover,
  .jobhub-mock--editor-with-rewrites[data-active-tab="criteria"] .jh-panel--criteria {
    display: block;
  }

  .jh-editor-panel { display: none; }

  .jh-section-title {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-weight: 600;
    font-size: 18px;
    color: #1A1814;
    margin-bottom: 14px;
  }

  .jh-bullet-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .jh-bullet-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .jh-bullet-marker {
    width: 6px;
    height: 6px;
    border-radius: 1px;
    background: #2D5A6E;
    flex-shrink: 0;
    margin-top: 9px;
  }

  .jh-bullet-text {
    font-size: 14px;
    font-weight: 400;
    color: #1A1814;
    line-height: 1.6;
  }

  .jh-ai-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 9999px;
    background: rgba(197, 160, 89, 0.18);
    color: #C5A059;
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    vertical-align: middle;
    margin-right: 6px;
  }

  .jh-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid rgba(26, 24, 20, 0.08);
  }

  .jh-button-ghost {
    background: none;
    border: none;
    font-size: 14px;
    font-weight: 500;
    color: #5C5750;
    cursor: default;
    padding: 6px 0;
  }

  .jh-button-group {
    display: flex;
    gap: 8px;
  }

  .jh-button-secondary {
    background: transparent;
    border: 1px solid rgba(26, 24, 20, 0.08);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #1A1814;
    cursor: default;
  }

  .jh-button-primary {
    background: #2D5A6E;
    color: #FFFFFF;
    border: none;
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    cursor: default;
  }
</style>
</head>
<body style="background:#FAF7F2; padding:48px; display:flex; align-items:center; justify-content:center;">

<section class="jobhub-mock jobhub-mock--editor-with-rewrites" data-active-tab="{{ACTIVE_TAB}}">

  <div class="jh-tab-bar">
    <span class="jh-tab jh-tab--active">Resume</span>
    <span class="jh-tab jh-tab--inactive">Cover letter</span>
    <span class="jh-tab jh-tab--inactive">Selection criteria</span>
  </div>

  <!-- Panel: Resume -->
  <div class="jh-editor-panel jh-panel--resume">
    <div class="jh-section-title">Achievements</div>
    <ul class="jh-bullet-list">
      <li class="jh-bullet-item">
        <span class="jh-bullet-marker"></span>
        <span class="jh-bullet-text">{{BULLET_NORMAL}}</span>
      </li>
      <li class="jh-bullet-item">
        <span class="jh-bullet-marker"></span>
        <span class="jh-bullet-text"><span class="jh-ai-badge">AI</span>{{BULLET_REWRITTEN}}</span>
      </li>
    </ul>
  </div>

  <!-- Panel: Cover Letter -->
  <div class="jh-editor-panel jh-panel--cover">
    <div class="jh-section-title">Opening Paragraph</div>
    <ul class="jh-bullet-list">
      <li class="jh-bullet-item">
        <span class="jh-bullet-marker"></span>
        <span class="jh-bullet-text">{{BULLET_NORMAL}}</span>
      </li>
    </ul>
  </div>

  <!-- Panel: Criteria -->
  <div class="jh-editor-panel jh-panel--criteria">
    <div class="jh-section-title">Key Selection Criteria</div>
    <ul class="jh-bullet-list">
      <li class="jh-bullet-item">
        <span class="jh-bullet-marker"></span>
        <span class="jh-bullet-text">{{BULLET_NORMAL}}</span>
      </li>
    </ul>
  </div>

  <div class="jh-actions">
    <button class="jh-button-ghost">&larr; Back</button>
    <div class="jh-button-group">
      <button class="jh-button-secondary">Review</button>
      <button class="jh-button-primary">Save &amp; continue</button>
    </div>
  </div>

</section>

</body>
</html>
